          <h2><a href="/case_study/ai-launchpad">AI Launchpad — Community AI Skills Workshop</a></h2>
          <span class="tag">AI Training</span><span class="tag">Gen3block</span><span class="tag">Northampton · March 2026</span>
          <p>Delivered by Gen3block in partnership with Unity in Diversity (UK) and the United African Association. A measurable impact report from a hands-on community AI workshop held on 4 March 2026 in Northampton. 14 attendees from healthcare, charity, education, production, and community volunteering sectors.</p>
          <ul>
            <li>Average AI confidence rose from 3.8/10 to 7.4/10 — a +94% relative lift in a single 2.5-hour session</li>
            <li>85% of attendees ended more confident than they started</li>
            <li>54% promoter-level recommendation scores (9 or 10 out of 10)</li>
            <li>NPS equivalent: +38.5</li>
            <li>Top outcome themes: CV building, job search, safe AI use, prompting, business applications</li>
            <li>All data collected with informed participant consent and handled in accordance with UK GDPR</li>
          </ul>

          <h2><a href="/case_study/uid">Unity in Diversity (UiD) — Digital Assistance Platform</a></h2>
          <span class="tag">Social Support</span>
          <p>Transformed a static charity website into a structured digital assistance platform for men facing challenges across employment, housing, addiction, emotional wellbeing, relationships, and loneliness.</p>
          <ul>
            <li>Risk-aware triage engine with weighted scoring and priority levels</li>
            <li>5-step mobile-first intake form with trauma-informed language</li>
            <li>Admin portal for case management and assignment</li>
            <li>PostgreSQL backend with audit trails and GDPR-compliant data flows</li>
          </ul>

          <h2><a href="/case_study/iufp">IUFP — Digital Transformation for International Education</a></h2>
          <span class="tag">EdTech</span>
          <p>Multi-tenant virtual learning environment with RAG-powered search, automated admissions processing, and real-time progress tracking across 10+ countries.</p>
          <ul>
            <li>5× faster application processing</li>
            <li>10+ countries served</li>
            <li>Real-time progress and admissions tracking</li>
          </ul>

          <h2><a href="/case_study/bold-munch">Bold Munch — From Idea to a Thriving Digital Bakery</a></h2>
          <span class="tag">Food &amp; E-Commerce</span>
          <p>Custom ordering platform, WhatsApp Business integration, postcode-validated delivery zones, and social media presence built from scratch for an independent bakery.</p>
          <ul>
            <li>100+ products sold in 60 days across web and social media</li>
            <li>Postcode-validated delivery zones</li>
            <li>WhatsApp Business order notifications</li>
          </ul>
